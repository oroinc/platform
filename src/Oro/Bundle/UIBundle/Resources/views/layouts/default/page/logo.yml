layout:
    actions:
        - '@add':
            id: logo
            parentId: middle_bar_logo
            blockType: logo
            options:
                vars:
                    logo_small: '=data["asset"].getUrl(data["theme"].getLogoSmall(context["theme"]))'

        - '@add':
            id: logo_print
            blockType: logo
            parentId: page_container
            siblingId: page_header
            options:
                attr:
                    class: 'logo--print-only'
                renderLink: false
                vars:
                    logo_small: '=data["asset"].getUrl(data["theme"].getLogoSmall(context["theme"]))'
                    fetchpriority: 'low'
