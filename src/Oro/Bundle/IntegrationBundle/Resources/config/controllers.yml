services:
    _defaults:
        public: true

    Oro\Bundle\IntegrationBundle\Controller\IntegrationController:
        calls:
            - ['setContainer', ['@Psr\Container\ContainerInterface']]
        tags:
            - { name: container.service_subscriber }

    Oro\Bundle\IntegrationBundle\Controller\WebhookProducerSettingsController:
        calls:
            - ['setContainer', ['@Psr\Container\ContainerInterface']]
        tags:
            - { name: container.service_subscriber }

    Oro\Bundle\IntegrationBundle\Controller\WebhookController:
        calls:
            - ['setContainer', ['@Psr\Container\ContainerInterface']]
        tags:
            - { name: container.service_subscriber }
